<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antes y Después</title>
<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  color: #fff;
}
.container {
  width: 100%;
  max-width: 1100px;
  margin: auto;
  padding: 20px 20px 10px;
  box-sizing: border-box;
}
.slider {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  border-radius: 14px;
}
.slider img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.after {
  position: absolute;
  inset: 0;
  overflow: hidden;
  clip-path: inset(0 50% 0 0);
}
.divider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 3px;
  height: 100%;
  background: rgba(255,255,255,0.95);
  cursor: ew-resize;
  box-shadow: 0 0 12px rgba(255,255,255,0.6);
}
.handle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  color: black;
  padding: 10px 14px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: bold;
  box-shadow: 0 6px 18px rgba(0,0,0,0.6);
}
.label {
  position: absolute;
  top: 12px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  border-radius: 6px;
}
.before-label {
  left: 12px;
}
.after-label {
  right: 12px;
}
.copy {
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
  opacity: 0.85;
}
@media (max-width: 768px) {
  .container {
    padding: 15px 15px 5px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="slider" id="slider">
    <img src="https://i.imgur.com/k1RWxUB.jpeg" alt="Antes">
    <div class="after" id="after">
      <img src="https://i.imgur.com/5QbcVo2.jpeg" alt="Después">
    </div>
    <div class="divider" id="divider">
      <div class="handle">↔</div>
    </div>
    <div class="label before-label">ANTES</div>
    <div class="label after-label">DESPUÉS</div>
  </div>
  <div class="copy">
    De esto… a esto en minutos. Resultados reales.
  </div>
</div>

<script>
const slider = document.getElementById('slider');
const after = document.getElementById('after');
const divider = document.getElementById('divider');

let isDragging = false;
let autoMove = true;
let direction = 1;
let current = 50;

// Detectar si es mobile
const isMobile = window.innerWidth <= 768;

// MOUSE DRAG (se mantiene)
divider.addEventListener('mousedown', () => {
  isDragging = true;
  autoMove = false;
});

window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  moveSlider(e.clientX);
});

// 🔥 HOVER EN DESKTOP (SIN CLICK)
if (!isMobile) {
  slider.addEventListener('mousemove', (e) => {
    autoMove = false;
    moveSlider(e.clientX);
  });

  // 🔥 NUEVO: REACTIVAR AUTO CUANDO SALE EL MOUSE
  slider.addEventListener('mouseleave', () => {
    autoMove = true;
  });
}

// TOUCH (mobile)
slider.addEventListener('touchstart', () => {
  isDragging = true;
  autoMove = false;
});

window.addEventListener('touchend', () => isDragging = false);

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  moveSlider(e.touches[0].clientX);
});

// FUNCIÓN PRINCIPAL
function moveSlider(clientX) {
  const rect = slider.getBoundingClientRect();
  let x = clientX - rect.left;

  if (x < 0) x = 0;
  if (x > rect.width) x = rect.width;

  const percent = (x / rect.width) * 100;

  after.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
  divider.style.left = percent + "%";
}

// ANIMACIÓN AUTOMÁTICA
function animate() {
  if (!autoMove) return;

  current += direction * 0.2;

  if (current >= 80) direction = -1;
  if (current <= 20) direction = 1;

  after.style.clipPath = `inset(0 ${100 - current}% 0 0)`;
  divider.style.left = current + "%";

  requestAnimationFrame(animate);
}
animate();

/* ALTURA DINÁMICA - SOLO DESKTOP */
function sendHeight() {
  if (window.innerWidth > 768) {
    window.parent.postMessage({
      type: "resize",
      id: "antesdespues",
      height: document.body.scrollHeight
    }, "*");
  }
}
window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
</script>

</body>
</html>
