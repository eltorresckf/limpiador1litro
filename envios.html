<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
  font-family: sans-serif;
}

/* 🔥 CONTENEDOR GLOBAL (ESTÁNDAR PARA TODAS TUS SECCIONES) */
.ckf-wrapper {
  width: 100%;
  padding: 0 16px;
  box-sizing: border-box;
}

.ckf-container {
  width: 100%;
}

/* SOLO DESKTOP */
@media (min-width: 1024px) {
  .ckf-container {
    max-width: 1100px;
    margin: 0 auto;
  }
}

/* ===== TU DISEÑO ===== */

.shipping-wrapper {
  background: #0f0f0f;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
}

.shipping-message {
  color: #fff;
  font-weight: 600;
  margin-bottom: 15px;
  font-size: 15px;
}

.shipping-timeline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.icon {
  background: linear-gradient(135deg, #cd9341, #e0a85a);
  border-radius: 50%;
  width: 46px;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
  animation: pulse 2s infinite;
  transition: all 0.3s ease;
}

.icon svg {
  width: 20px;
  height: 20px;
  fill: white;
  stroke: #000;
  stroke-width: 1.2;
}

.icon:hover {
  box-shadow: 0 0 15px rgba(205,147,65,0.6);
  transform: scale(1.1);
}

.title {
  color: #aaa;
  font-size: 12px;
  margin: 0;
}

.date {
  color: #fff;
  font-size: 13px;
  font-weight: bold;
}

.arrow {
  height: 2px;
  width: 40px;
  background: linear-gradient(90deg, transparent, #cd9341, transparent);
  animation: flow 2s linear infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

@keyframes flow {
  0% { opacity: 0.3; }
  50% { opacity: 1; }
  100% { opacity: 0.3; }
}

/* 🔥 MOBILE */
@media (max-width: 600px) {
  .shipping-timeline {
    flex-direction: row;
  }

  .arrow {
    width: 30px;
    height: 2px;
  }
}
</style>
</head>

<body>

<div class="ckf-wrapper">
  <div class="ckf-container">

    <div class="shipping-wrapper">

      <p class="shipping-message" id="shipping-message"></p>

      <div class="shipping-timeline">
        
        <div class="step">
          <div class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            </svg>
          </div>
          <p class="title">Pedido</p>
          <p class="date" id="order-date"></p>
        </div>

        <div class="arrow"></div>

        <div class="step">
          <div class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M3 7h13v10H3zM16 10h3l2 3v4h-5zM5 19a2 2 0 1 0 0.001-4.001A2 2 0 0 0 5 19zm12 0a2 2 0 1 0 0.001-4.001A2 2 0 0 0 17 19z"/>
            </svg>
          </div>
          <p class="title">Envío</p>
          <p class="date" id="ship-date"></p>
        </div>

        <div class="arrow"></div>

        <div class="step">
          <div class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M21 8v13H3V8M1 3h22v5H1z"/>
            </svg>
          </div>
          <p class="title">Entrega</p>
          <p class="date" id="delivery-date"></p>
        </div>

      </div>

    </div>

  </div>
</div>

<script>
function formatDate(date) {
  return date.toLocaleDateString('es-MX', { month: 'short', day: 'numeric' });
}

function isBusinessDay(day) {
  return day !== 0 && day !== 6;
}

function getNextBusinessDay(date) {
  let result = new Date(date);
  do {
    result.setDate(result.getDate() + 1);
  } while (!isBusinessDay(result.getDay()));
  return result;
}

function addDeliveryDays(date, days) {
  let result = new Date(date);
  let added = 0;
  while (added < days) {
    result.setDate(result.getDate() + 1);
    if (result.getDay() !== 0) added++;
  }
  return result;
}

const now = new Date();
const today = new Date(now);

const cutoffHour = 12;
let shipDate;

const currentDay = now.getDay();

if (isBusinessDay(currentDay)) {
  if (now.getHours() < cutoffHour) {
    shipDate = new Date(today);
  } else {
    shipDate = getNextBusinessDay(today);
  }
} else {
  shipDate = getNextBusinessDay(today);
}

const deliveryStart = addDeliveryDays(shipDate, 3);
const deliveryEnd = addDeliveryDays(shipDate, 5);

document.getElementById("order-date").textContent = formatDate(today);
document.getElementById("ship-date").textContent = formatDate(shipDate);
document.getElementById("delivery-date").textContent =
  formatDate(deliveryStart) + " – " + formatDate(deliveryEnd);

let message;

if (isBusinessDay(currentDay) && now.getHours() < cutoffHour) {
  let hoursLeft = cutoffHour - now.getHours();
  message = "⚡ Pide en las próximas " + hoursLeft + "h y se envía hoy";
} else if (isBusinessDay(currentDay)) {
  message = "📦 Pide hoy y se envía el siguiente día hábil";
} else {
  message = "📦 Pide hoy y se envía el lunes";
}

message += ". Recíbelo entre " +
  formatDate(deliveryStart) + " – " + formatDate(deliveryEnd);

document.getElementById("shipping-message").textContent = message;
</script>

</body>
</html>
