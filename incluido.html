<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.container {
  padding: 28px 16px;
}
h2 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 26px;
  letter-spacing: 0.3px;
}
.grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.card {
  background: #0d0d0d;
  border-radius: 16px;
  padding: 18px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  border: 1px solid rgba(205,147,65,0.12);
  opacity: 0;
  transform: translateY(20px);
  transition: 
    transform 0.15s ease,
    background 0.2s ease,
    border 0.2s ease,
    box-shadow 0.2s ease,
    opacity 0.5s ease;
}
.card.show {
  opacity: 1;
  transform: translateY(0);
}
.card:hover {
  border: 1px solid rgba(205,147,65,0.35);
  box-shadow: 0 0 12px rgba(205,147,65,0.08);
}
.card:active {
  transform: scale(0.97);
  background: #121212;
  border: 1px solid rgba(205,147,65,0.4);
}
.icon {
  min-width: 44px;
  height: 44px;
  border-radius: 12px;
  background: rgba(205,147,65,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.card:hover .icon {
  transform: scale(1.08);
  background: rgba(205,147,65,0.15);
}
.card:active .icon {
  transform: scale(0.95);
  background: rgba(205,147,65,0.2);
}
.icon svg {
  width: 20px;
  height: 20px;
  stroke: #cd9341;
}
.title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
}
.text {
  font-size: 13.5px;
  color: #bfbfbf;
  line-height: 1.4;
}
.desc {
  margin-top: 22px;
  text-align: center;
  font-size: 14px;
  color: #9a9a9a;
}
@media (min-width: 768px) {
  .grid {
    flex-direction: row;
  }
  .card {
    flex: 1;
  }
}
</style>
</head>
<body>
<div class="container">
  <h2>¿Qué incluye tu kit?</h2>
  <div class="grid">
    <div class="card">
      <div class="icon">
        <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M9 3h6M10 3v4h4V3M8 7h8l1 13H7L8 7z"/>
        </svg>
      </div>
      <div>
        <div class="title">Limpiador premium 250ml</div>
        <div class="text">Remueve suciedad sin dañar materiales delicados</div>
      </div>
    </div>
    <div class="card">
      <div class="icon">
        <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M3 14h18M5 14v4M9 14v4M13 14v4M17 14v4"/>
        </svg>
      </div>
      <div>
        <div class="title">Cepillo multipropósito</div>
        <div class="text">Limpieza profunda para todo tipo de sneakers</div>
      </div>
    </div>
    <div class="card">
      <div class="icon">
        <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24">
          <rect x="3" y="6" width="18" height="12" rx="2"/>
        </svg>
      </div>
      <div>
        <div class="title">Toalla de microfibra</div>
        <div class="text">Absorbe y deja un acabado limpio sin residuos</div>
      </div>
    </div>
  </div>
  <div class="desc">
    Todo lo necesario para dejar tus sneakers como nuevos.
  </div>
</div>
<script>
/* ANIMACIÓN AL HACER SCROLL */
const cards = document.querySelectorAll('.card');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, {
  threshold: 0.2
});
cards.forEach(card => observer.observe(card));

/* ALTURA DINÁMICA - SOLO DESKTOP */
function sendHeight() {
  if (window.innerWidth > 768) {
    window.parent.postMessage({
      type: "resize",
      id: "incluido",
      height: document.body.scrollHeight
    }, "*");
  }
}
window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
</script>
</body>
</html>
